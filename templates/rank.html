<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日发言排行榜</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            width: 800px;
            /* Fixed width for screenshot */
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .header {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            padding-left: 10px;
        }

        .header-info h1 {
            margin: 0;
            font-size: 28px;
            color: #d65db1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .header-info p {
            margin: 5px 0 0;
            color: #555;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 0;
            color: white;
            position: relative;
            overflow: hidden;
            height: 80px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-bg {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background-size: cover;
            background-position: center;
            filter: blur(30px) brightness(0.6);
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            margin-right: 15px;
            flex-shrink: 0;
            background-color: #fff;
        }

        .info {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        .stats {
            font-size: 13px;
            opacity: 0.95;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Rank badges or specific colors if needed */
        .rank-badge {
            display: none;
            /* Can add badge logic if needed */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-info">
                <h1>今日发言排行榜</h1>
                <p>{{ date }}</p>
            </div>
        </div>
        <div class="grid">
            {% for user in users %}
            <div class="card">
                <div class="card-bg" style="background-image: url('{{ user.avatar }}');"></div>
                <div class="card-content">
                    <img src="{{ user.avatar }}" class="avatar" alt="Avatar"
                        onerror="this.src='https://ui-avatars.com/api/?name={{ user.name }}&background=random'">
                    <div class="info">
                        <div class="name">{{ user.name }}</div>
                        <div class="stats">发言次数: {{ user.count }}次 排名: {{ user.rank }}</div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
